<!DOCTYPE html>
<!--
  This is profile page, where user can check and change their profile.
-->
<html>
  <head lang="en">
  <meta charset="utf-8">
  <title>User Profile</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <script src="profile.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/theme.js"></script>
</head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <header>
        <button id="back">Back</button>
        <img id="profile-pic" src="../img/logo.png" alt="User profile">
      </header>
      <section id="basic-information">
        <div class="profile-field">
          <h2 id="name-display">Harry Cheng</h2>
          <input type="text" id="name-edit" class="edit-field hidden" value="Harry Cheng">
        </div>
        <div class="profile-field">
          <address id="address-display">4001 E Stevens Way NE, Seattle, WA 98195</address>
          <input type="text" id="address-edit" class="edit-field hidden"
          value="4001 E Stevens Way NE, Seattle, WA 98195">
        </div>
        <div class="profile-actions">
          <button id="edit-btn">Edit</button>
          <button id="save-btn" class="hidden">Save</button>
          <button id="cancel-btn" class="hidden">Cancel</button>
        </div>
      </section>
      <section id="other-information">
        <p>
          Other info.
          Note from Rena: the change of name is not yet permanent, waiting for future improvement.
        </p>
      </section>
    </main>
  </body>
</html>
