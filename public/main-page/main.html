<!DOCTYPE html>
<!--
  Name: Rena Yin & Harry Cheng
  Husky Help Husky — Campus Marketplace Web App

  Marketplace page for Husky Help Husky.
  The left navigation bar derect to shopping cart, transaction history, and profile
  Right content include item board, search and filter controls, layout toggle, and status message.
-->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Husky Help Husky | Marketplace</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="main.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <header>
      <h1>Husky Help Husky</h1>
      <button id="theme-toggle">Toggle Theme</button>
    </header>
    <div class="page-layout">
      <aside>
        <div id="nav-toggle">
          <button id="nav-toggle-btn">X</button>
        </div>
        <nav>
          <ul>
            <li id="open-cart-page">Shopping cart</li>
            <li id="open-history-page">Transaction History</li>
            <li id="open-profile-page">Profile and Settings</li>
            <!-- <li id="open-guide-page">Platform Guide</li> -->
          </ul>
        </nav>
        <div id="logout-section">
          <button id="logout-btn">Log out</button>
        </div>
      </aside>
      <main id="content">
        <header>
          <search id="search-section">
            <div id="search-bar-section">
              <select id="category-filter">
                <option value="">All</option>
                <option value="books">Books</option>
                <option value="electronics">Electronics</option>
                <option value="merch">Merch</option>
                <option value="home">Home</option>
              </select>
                <label for="search-input" class="sr-only">Search items</label>
              <div id="search-input-wrap">
                <input type="text" id="search-input" placeholder="Search...">
                <button id="search-clear-btn" class="hidden" type="button" aria-label="Clear search keyword">
                  &times;
                </button>
              </div>
              <button id="search-btn">&#128269;</button>
            </div>
            <div id="filter-pills">
              <!-- Filter pills will be dynamically added here -->
            </div>
          </search>
          <div id="layout-toggle" role="group" aria-label="Board layout">
            <button id="layout-grid-btn" class="layout-option" type="button" aria-label="Grid view" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
                <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
              </svg>
            </button>
            <button id="layout-list-btn" class="layout-option" type="button" aria-label="List view" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <circle cx="4" cy="6" r="1.4"></circle>
                <circle cx="4" cy="12" r="1.4"></circle>
                <circle cx="4" cy="18" r="1.4"></circle>
              </svg>
            </button>
          </div>
          <!-- <img id="profile-pic" src="../img/logo.png" alt="User profile"> -->
        </header>
        <section id="item-board">
          <div id="board-title">
            <h2>Product board</h2>
            <p>Browse items and add something you like.</p>
          </div>
          <div id="status-message" class="hidden">
            <h2></h2>
            <p></p>
          </div>
          <div id="item-list">
            <!-- Item cards will be dynamically added here -->
          </div>
        </section>
      </main>
    </div>

  </body>
</html>
