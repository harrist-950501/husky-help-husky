  Main page for Husky Help Husky.
  The left navigation bar derect to shopping cart, transaction history, and profile
  Right content include item board, search and filter controls, layout toggle, and status message.
-->
<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>Main page</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="main.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <aside>
        <header>
          <h1>Navigation Bar</h1>
          <button id="nav-toggle-btn">X</button>
        </header>
        <section>
          <ul>
            <li id="open-cart-page">Shopping cart</li>
            <li id="open-history-page">Transaction History</li>
            <li id="open-profile-page">Profile and Settings</li>
            <li>Platform Guide</li>
          </ul>
        </section>
        <footer>
          <button id="logout-btn">Log out</button>
        </footer>
      </aside>
      <section id="content">
        <header>
          <section id="search-section">
            <input type="text" id="search-bar" placeholder="Search...">
            <section>
              <button id="search-btn">search</button>
              <button id="unsearch-btn">unsearch</button>
              <select id="category-filter">
                <option value="">All categories</option>
                <option value="books">Books</option>
                <option value="electronics">Electronics</option>
                <option value="merch">Merch</option>
                <option value="home">Home</option>
              </select>
            </section>
          </section>
          <button id="layout-toggle">Toggle layout</button>
          <img id="profile-pic" src="../img/logo.png" alt="User profile">
        </header>
        <section id="status-message">
          <h2>Product board</h2>
          <p>Browse items and add something you like.</p>
        </section>
        <section id="item-board">
        </section>
      </section>
    </main>
  </body>
</html>
