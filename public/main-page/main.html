<!DOCTYPE html>
<!--
  This is main page, where user can check the available products.
  It is made of two part:
    A navigation bar for user to move to other pages
    A content part where user browse through the products
  ..
-->
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>Main page</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="main.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <aside>
        <header>
          <h1>Navigation Bar</h1>
          <button>X</button>
        </header>
        <section>
          <ul>
            <li>My Listings</li>
            <li id="open-history-page">Transaction History</li>
            <li id="open-profile-page">Profile and Settings</li>
            <li>Platform Guide</li>
          </ul>
        </section>
        <footer>
          <button id="logout-btn">Log out</button>
        </footer>
      </aside>
      <section id="content">
        <header>
          <input type="text" id="search-bar" placeholder="Search...">
          <img id="profile-pic" src="../img/logo.png" alt="User profile">
        </header>
        <p id="status-message" aria-live="polite" class="status-message"></p>
        <section id="item-board">
          <!-- <article class="item">Item1</article>
          <article class="item">Item2</article>
          <article class="item">Item3</article>
          <article class="item">Item4</article> -->
          <article class="item-card">
            <section class="img-container">
              <img src="../img/cse-142-textbook.jpg" alt="CSE 142 Textbook">
            </section>
            <section class="metainfo">
              <h2 class="title">CSE 142 Textbook</h2>
              <p class="rating">★★★★☆ <span>4.3 / 5</span></p>
              <p class="price">$18.00</p>
              <button class="cart-btn">Add to cart</button>
            </section>
          </article>
          <article class="item-card">
            <section class="img-container">
              <img src="../img/cse-143-textbook.jpg" alt="CSE 142 Textbook">
            </section>
            <section class="metainfo">
              <h2 class="title">CSE 143 Textbook</h2>
              <p class="rating">★★★★☆ <span>4.6 / 5</span></p>
              <p class="price">$20.00</p>
              <button class="cart-btn">Add to cart</button>
            </section>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
