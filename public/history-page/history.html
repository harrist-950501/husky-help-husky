<!DOCTYPE html>
<!--
  This is history page. It allow user to do view through past transaction either by keyword or
  selected way of sorting.
-->
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>History Transaction</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="history.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="history.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <header>
        <button id="back">Back</button>
        <h1>Transaction history</h1>
      </header>
      <section id="console">
        <select id="transaction-sorting">
          <option value="time">Time (newest first)</option>
          <option value="price">Price (high to low)</option>
        </select>
      </section>
      <section id="status-message">
        <h2>Trantaction board</h2>
        <p>Check out all the transacton and rate the item if you want!</p>
      </section>
      <section id="transaction-board">
      </section>
    </main>
  </body>
</html>
