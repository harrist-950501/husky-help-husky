<!DOCTYPE html>
<!--
  Name: Rena Yin & Harry Cheng
  Husky Help Husky — Campus Marketplace Web App

  History page for Husky Help Husky.
  Shows the logged-in user's past transactions, supports sorting by time or price,
  and lets buyers rate individual items from each order.
-->
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>Transaction History</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="history.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="history.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <header>
      <h1>Husky Help Husky</h1>
      <button id="theme-toggle">Toggle Theme</button>
    </header>
    <main class="page-layout">
      <header>
        <button id="back">Back</button>
        <h2>Transaction history</h2>
      </header>
      <section id="console">
        <select id="transaction-sorting">
          <option value="time">Time (newest first)</option>
          <option value="price">Price (high to low)</option>
        </select>
      </section>
      <section id="transaction-board">
        <div id="board-title">
          <h2>Transaction board</h2>
          <p>Check out all the transactions and rate the item if you want!</p>
        </div>
        <section id="status-message" class="hidden">
          <svg class="status-error-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <h2></h2>
          <p></p>
          <button class="status-dismiss-btn" type="button" aria-label="Dismiss error message">&times;</button>
        </section>
      </section>
    </main>
  </body>
</html>
