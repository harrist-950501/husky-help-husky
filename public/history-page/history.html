<!DOCTYPE html>
<!--
  This is history page. It allow user to do view through past transaction either by keyword or
  selected way of sorting.
-->
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>History Transaction</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="history.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="history.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <header>
        <button id="back">Back</button>
        <h1>Transaction page</h1>
      </header>
      <section id="console">
        <select id="transaction-sorting">
          <option value="time">Time (newest first)</option>
          <option value="price">Price (high to low)</option>
        </select>
      </section>
      <section id="status-message">
        <h2>Trantaction board</h2>
        <p>Check out all the transacton and rate the item if you want!</p>
      </section>
      <section id="transaction-board">
        <article class="transaction-card" data-code="VXP0HZ8G">
          <header>
            <section class="main">
              <p class="label">Order</p>
              <h3 class="code">#VXP0HZ8G</h3>
            </section>
            <section class="meta">
              <p class="date">2025-12-08 18:30</p>
              <p class="summary">
                <span class="count">3 items</span>
                ·
                <span class="total">$78</span>
              </p>
            </section>
          </header>
          <ul class="order-items">
            <li class="order-item" data-item-id="2">
              <section class="main">
                <p class="title">CSE 143 Textbook</p>
                <p class="meta">
                  Qty <span class="qty">2</span>
                  · $<span class="price">20</span> each
                </p>
              </section>
              <button class="rate-btn">
                Rate
              </button>
            </li>
            <li class="order-item" data-item-id="5">
              <div class="main">
                <p class="title">Cute Husky Plushie</p>
                <p class="meta">
                  Qty <span class="qty">1</span>
                  · $<span class="price">12</span> each
                </p>
              </div>
              <button class="rate-btn" type="button">
                Rate
              </button>
            </li>
          </ul>
          <footer class="rate-panel">
            <p class="rtarget-label">Rating item:</p>
            <p class="target-title">CSE 143 Textbook</p>
            <section class="rate-row">
              <label>
                Stars:
                <select class="rate-stars" name="stars">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </label>
            </section>
            <section class="rate-row">
              <label>
                Comment:
                <textarea class="rate-comment" name="comment" rows="3">
                </textarea>
              </label>
            </section>
            <section class="rate-actions">
              <button class="submit-btn">Submit</button>
              <button class="cancel-btn secondary-btn" type="button">Cancel</button>
            </section>
          </footer>
        </article>
      </section>
    </main>
  </body>
</html>
