<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:i...00;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <header>
        <button id="back-button" class="secondary-btn">Back to main page</button>
        <section id="cart-title">
          <h1>Shopping Cart</h1>
          <p class="cart-subtitle">3 items in your cart</p>
        </section>
      </header>
      <section id="content">
        <section id="cart-board">
          <article class="cart-card">
            <section class="cart-img">
              <img src="../img/logo.png" alt="Sample product">
            </section>
            <section class="cart-main">
              <h3 class="cart-title">Sample Book Title</h3>
              <p class="cart-meta">Books · Like new</p>
              <p class="cart-price">$24.00</p>
            </section>
            <section class="cart-actions">
              <section class="qty-control">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </section>
              <p class="cart-subtotal">$24.00</p>
              <button class="remove-btn">Remove</button>
            </section>
          </article>

          <article class="cart-card">
            <section class="cart-img">
              <img src="../img/logo.png" alt="Sample product">
            </section>
            <section class="cart-main">
              <h3 class="cart-title">Sample Book Title</h3>
              <p class="cart-meta">Books · Like new</p>
              <p class="cart-price">$24.00</p>
            </section>
            <section class="cart-actions">
              <section class="qty-control">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </section>
              <p class="cart-subtotal">$24.00</p>
              <button class="remove-btn">Remove</button>
            </section>
          </article>

          <article class="cart-card">
            <section class="cart-img">
              <img src="../img/logo.png" alt="Sample product">
            </section>
            <section class="cart-main">
              <h3 class="cart-title">Sample Book Title</h3>
              <p class="cart-meta">Books · Like new</p>
              <p class="cart-price">$24.00</p>
            </section>
            <section class="cart-actions">
              <section class="qty-control">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </section>
              <p class="cart-subtotal">$24.00</p>
              <button class="remove-btn">Remove</button>
            </section>
          </article>
        </section>
        <section id="cart-summary">
          <h2>Order Summary</h3>
          <section class="summary-row">
            <span>Subtotal</span>
            <span>$139.00</span>
          </section>
          <section class="summary-row">
            <span>Estimated tax</span>
            <span>$0.00</span>
          </section>
          <section class="summary-row total">
            <span>Total</span>
            <span>$139.00</span>
          </section>
          <button id="checkout-btn">Checkout</button>
          <button class="secondary-btn summary-back-btn">Continue shopping</button>
        </section>
      </section>
      <!-- <section id="empty-cart" class="hidden">
        <h2>Your cart is empty</h2>
        <p>Browse items and add something you like.</p>
        <button class="secondary-btn">Back to main page</button>
      </section> -->
    </main>
  </body>
</html>
