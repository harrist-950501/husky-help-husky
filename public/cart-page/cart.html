<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="cart.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <header>
        <button class="back-btn">Back</button>
        <section id="title">
          <h1>Shopping Cart</h1>
          <p><span id="cart-count">3</span> items in your cart</p>
        </section>
      </header>
      <section id="status-message">
        <h2></h2>
        <p></p>
      </section>
      <section id="content">
        <section id="cart-board">
        </section>
        <section id="cart-summary">
          <h2>Order Summary</h2>
          <section id="total">
            <span>Total</span>
            <span id="cart-total">$0</span>
          </section>
          <button id="confirm-btn">Confirm order</button>
          <button id="submit-btn" class="hidden">Submit order</button>
          <button class="back-btn secondary-btn" id="summary-back">Continue shopping</button>
        </section>
      </section>
    </main>
  </body>
</html>
