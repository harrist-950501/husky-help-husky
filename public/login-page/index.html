<!DOCTYPE html>
<!--
  This is login page, where user get to login their account.
  It is made of two part: welcome area and login area
-->
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>User Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="index.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <button id="theme-toggle">Toggle Theme</button>
    <main>
      <section id="welcome-area">
        <h1>Welcome to <span>Husky Help Husky</span></h1>
        <p>
          A community where UW students can easily trade, share, and reuse second-hand goods.
          <br>
          Connect, give, and find what you need — all within the Husky family.
        </p>
      </section>
      <section id="login-area">
        <h2>User Login</h2>
        <form>
          <label for="username">
            Username <input id='username' name="user" type='text' required>
          </label>
          <label for="password">
            Password<input id='password' name="password" type='password' required>
          </label>
          <button>Login</button>
        </form>
        <section class="error hidden">
          <p>Login unsuccessful</p>
        </section>
      </section>
    </main>
  </body>
</html>
