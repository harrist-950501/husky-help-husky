<!DOCTYPE html>
<!--
  Name: Rena Yin & Harry Cheng
  Husky Help Husky — Campus Marketplace Web App

  Profile page for Husky Help Husky.
  Lets the logged-in user view and edit their display name, address,
  and personal Husky quote.
-->
<html>
  <head lang="en">
    <meta charset="utf-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="profile.js"></script>
    <script src="../theme.js"></script>
  </head>
  <body>
    <header>
      <h1>Husky Help Husky</h1>
      <button id="theme-toggle">Toggle Theme</button>
    </header>
    <main class="page-layout">
      <header>
        <button id="back">Back</button>
        <img id="profile-pic" src="../img/logo.png" alt="User profile">
      </header>

      <section id="status-message" class="hidden">
        <svg class="status-error-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <svg class="status-info-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <line x1="12" y1="11" x2="12" y2="16"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
        <h2></h2>
        <p></p>
        <button class="status-dismiss-btn" type="button" aria-label="Dismiss error message">&times;</button>
      </section>

      <section id="basic-information">
        <div class="profile-field">
          <h2 id="name-display">Your Name</h2>
          <input type="text" id="name-edit" class="edit-field hidden"
            placeholder="Your name">
          </div>

          <div class="profile-field">
            <address id="address-display">Add your address so buyers can find you.</address>
            <input type="text" id="address-edit" class="edit-field hidden"
            placeholder="Address (city, campus, etc.)">
          </div>

          <div class="profile-actions">
            <button id="edit-btn">Edit</button>
            <button id="save-btn" class="hidden">Save</button>
            <button id="cancel-btn" class="hidden secondary-btn">Cancel</button>
          </div>
        </section>

        <section id="other-information">
          <h2>My Husky Quote</h2>
          <p id="quote-display" class="quote">
            No quote yet. Add something that represents you!
          </p>
          <textarea id="quote-edit" class="edit-field hidden" rows="3"
          placeholder="Tell other Huskies something fun or inspiring."></textarea>
        </section>
      </main>
    </body>
    </html>
